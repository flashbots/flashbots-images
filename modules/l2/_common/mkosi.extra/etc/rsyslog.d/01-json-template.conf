#
# - this template formats event's metadata as JSON while leaving the
#   event's message as-is (expects it's already JSON)
# - the position.from addresses this known behavior
#   https://www.rsyslog.com/log-normalization-and-the-leading-space/
#
template(name="json-event-json-msg"
  type="list") {
    constant(value="{")
      constant(value="\"@timestamp\":\"")     property(name="timereported" dateFormat="rfc3339")
      constant(value="\",\"source\":\"")      property(name="programname")
      constant(value="\",\"procid\":\"")      property(name="procid")
      constant(value="\",\"message\":")       property(name="msg" position.from="2")
    constant(value="}\n")
}

#
# - this template formats event's metadata and message as JSON (expects
#   message is string)
# - the position.from addresses this known behavior
#   https://www.rsyslog.com/log-normalization-and-the-leading-space/
#
template(name="json-event-string-msg"
  type="list") {
    constant(value="{")
      constant(value="\"@timestamp\":\"")     property(name="timereported" dateFormat="rfc3339")
      constant(value="\",\"source\":\"")      property(name="programname")
      constant(value="\",\"procid\":\"")      property(name="procid")
      constant(value="\",\"message\":\"")     property(name="msg" format="json" position.from="2")
    constant(value="\"}\n")
}

#
# - this conditional action determines which template to use based on
#   the beginning of the event's message value
# - assumes that if a message starts with {, then that message is JSON
# - this follows the pattern found in /etc/rsyslog.d/50-default.conf
#
if ($msg startswith " {") then {
  *.*;auth,authpriv.none          -/var/log/syslog;json-event-json-msg
  & stop
} else {
  *.*;auth,authpriv.none          -/var/log/syslog;json-event-string-msg
  & stop
}

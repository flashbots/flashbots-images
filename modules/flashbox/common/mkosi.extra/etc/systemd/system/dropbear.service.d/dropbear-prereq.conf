[Unit]
After=wait-for-key.service searcher-firewall.service
Requires=wait-for-key.service searcher-firewall.service

[Service]
ExecStartPre=/usr/bin/chown -R searcher:searcher /home/searcher
ExecStartPre=/bin/sh -c 'test -f /etc/dropbear/dropbear_ed25519_host_key || /usr/bin/dropbearkey -t ed25519 -f /etc/dropbear/dropbear_ed25519_host_key'
# Derive the public key so ssh-pubkey-server can serve the control-plane host key
# at boot (before the searcher unlocks the disk), enabling attestation without TOFU.
ExecStartPre=/bin/sh -c 'test -f /etc/dropbear/dropbear_ed25519_host_key.pub || /usr/bin/dropbearkey -y -f /etc/dropbear/dropbear_ed25519_host_key | grep "^ssh-" > /etc/dropbear/dropbear_ed25519_host_key.pub'

[Build]
Environment=KERNEL_CONFIG_SNIPPETS_FLASHBOX=modules/flashbox/common/kernel/config.d
WithNetwork=true

[Content]
ExtraTrees=modules/flashbox/common/mkosi.extra
PostInstallationScripts=modules/flashbox/common/unmask-systemd.sh
                        modules/flashbox/common/mkosi.postinst
BuildScripts=modules/flashbox/common/mkosi.build

Packages=podman
         catatonit
         runc
         dropbear
         socat
         iptables
         iproute2
         conntrack
         netfilter-persistent
         curl
         jq
         logrotate
         sudo
         uidmap
         passt
         fuse-overlayfs
         libdevmapper1.02.1
         libjson-c5
         openssh-sftp-server
         libsnappy1v5

BuildPackages=build-essential
              git
              gcc
              golang
              cargo/trixie-backports
              rustc/trixie-backports
              autoconf
              automake
              libtool
              libssh-dev
              libdevmapper-dev
              libpopt-dev
              uuid-dev
              libblkid-dev
              libjson-c-dev
              gettext
              autopoint

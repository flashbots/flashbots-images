[Distribution]
Architecture=x86-64
Distribution=debian
Release=trixie

[Build]
PackageCacheDirectory=mkosi.cache
SandboxTrees=mkosi.builddir/mkosi.sources:/etc/apt/sources.list.d/mkosi.sources
Environment=KERNEL_VERSION=6.19
            KERNEL_CONFIG_SNIPPETS=shared/kernel/config.d
            KERNEL_PATCHES=shared/kernel/patches
WithNetwork=true

[Output]
Format=uki
ManifestFormat=json
OutputDirectory=build
Seed=630b5f72-a36a-4e83-b23d-6ef47c82fd9c

[Content]
SourceDateEpoch=0
KernelCommandLine=console=tty0 console=ttyS0,115200n8 mitigations=auto,nosmt spec_store_bypass_disable=on nospectre_v2 transparent_hugepage=madvise systemd.unit=minimal.target
ExtraTrees=shared/mkosi.extra
BuildScripts=shared/mkosi.build.d/*
SyncScripts=shared/mkosi.sync.d/*
PostInstallationScripts=shared/mkosi.postinst.d/*
FinalizeScripts=shared/mkosi.finalize.d/*

CleanPackageMetadata=true
# Kernel .deb built by the kernel build script and placed in $PACKAGEDIR
VolatilePackages=linux-image-*-mkosi-cloud
Packages=kmod
         systemd
         systemd-resolved
         systemd-boot-efi
         busybox
         util-linux
         procps
         ca-certificates
         openssl
         iproute2
         e2fsprogs
         chrony
BuildPackages=build-essential
              git
              curl
              cmake
              pkg-config
              clang
              flex
              bison
              elfutils
              bc
              perl
              gawk
              zstd
              libssl-dev
              libelf-dev
              dpkg-dev
              debhelper
              libdw-dev
              python3
              libncurses-dev
              xz-utils

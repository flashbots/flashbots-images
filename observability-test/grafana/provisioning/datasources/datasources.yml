apiVersion: 1
datasources:
  - name: Prometheus (local)
    type: prometheus
    access: proxy
    url: http://localhost:9090
    isDefault: true
    editable: true
    uid: prometheus-local

  - name: Prometheus (remote-write)
    type: prometheus
    access: proxy
    url: http://localhost:9999
    isDefault: false
    editable: true
    uid: prometheus-remote-write
